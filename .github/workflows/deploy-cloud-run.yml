name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'bank-statement-api' }}
  ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'bank-transaction-extractor' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push container image
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Prepare Cloud Run environment file
        run: |
          cat > cloud-run-env.yaml <<EOF
          NODE_ENV: production
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
          API_KEY: "${{ secrets.API_KEY }}"
          EOF

          if [[ -n "${{ secrets.BANK_ACCOUNT_NUMBER }}" ]]; then
            echo "BANK_ACCOUNT_NUMBER: \"${{ secrets.BANK_ACCOUNT_NUMBER }}\"" >> cloud-run-env.yaml
          fi

      - name: Deploy to Cloud Run
        run: |
          RUNTIME_SA="${{ vars.CLOUD_RUN_RUNTIME_SA }}"
          if [[ -z "$RUNTIME_SA" ]]; then
            RUNTIME_SA="bank-statement-api-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          fi

          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --image "$IMAGE" \
            --service-account "$RUNTIME_SA" \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 3 \
            --port 8080 \
            --env-vars-file cloud-run-env.yaml

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format 'value(status.url)'
